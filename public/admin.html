<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PV Lead Manager – Vertriebler</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 2rem auto; padding: 0 1rem; color: #1a202c; }
    h1 { font-size: 1.2rem; color: #1a56db; }
    p { font-size: 0.9rem; color: #64748b; line-height: 1.5; }
    textarea { width: 100%; min-height: 140px; padding: 0.5rem; font-size: 0.9rem; border: 1px solid #cbd5e1; border-radius: 8px; }
    input[type="password"] { width: 100%; padding: 0.45rem; margin: 0.35rem 0 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; }
    button { background: #1a56db; color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #1e40af; }
    .msg { margin-top: 0.75rem; font-size: 0.85rem; }
    .ok { color: #059669; }
    .err { color: #b91c1c; }
    a { color: #1a56db; }
  </style>
</head>
<body>
  <h1>Vertriebler (max. 20)</h1>
  <p>Ein Name pro Zeile. Wird in <code>data/vertriebler.json</code> auf dem Server gespeichert. Dafür muss <code>ADMIN_TOKEN</code> in der <code>.env</code> gesetzt sein.</p>

  <label for="token">Admin-Token</label>
  <input type="password" id="token" autocomplete="current-password" placeholder="Bearer-Token aus .env" />

  <label for="names">Namen</label>
  <textarea id="names" placeholder="Anna&#10;Ben&#10;…"></textarea>

  <button type="button" onclick="save()">Speichern</button>
  <div class="msg" id="msg"></div>
  <p style="margin-top:1.5rem"><a href="/">← Zurück zur Karte</a></p>

  <script>
    async function load() {
      const msg = document.getElementById('msg');
      msg.textContent = '';
      try {
        const r = await fetch('/api/vertriebler');
        const arr = await r.json();
        document.getElementById('names').value = Array.isArray(arr) ? arr.join('\n') : '';
      } catch (e) {
        msg.textContent = 'Konnte Liste nicht laden: ' + e.message;
        msg.className = 'msg err';
      }
    }

    async function save() {
      const msg = document.getElementById('msg');
      msg.textContent = '';
      const token = document.getElementById('token').value.trim();
      const raw = document.getElementById('names').value.split('\n').map((s) => s.trim()).filter(Boolean);
      if (!token) {
        msg.textContent = 'Bitte Admin-Token eintragen.';
        msg.className = 'msg err';
        return;
      }
      try {
        const r = await fetch('/api/admin/vertriebler', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({ names: raw }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || r.statusText);
        msg.textContent = 'Gespeichert: ' + data.names.join(', ');
        msg.className = 'msg ok';
      } catch (e) {
        msg.textContent = e.message;
        msg.className = 'msg err';
      }
    }

    load();
  </script>
</body>
</html>
